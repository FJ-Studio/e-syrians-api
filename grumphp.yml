grumphp:
    process_timeout: 120
    extensions:
        - YieldStudio\GrumPHPLaravelPint\ExtensionLoader
    tasks:
        laravel_pint:
            config: pint.json
            preset: psr12
            auto_fix: false
            auto_stage: 'pre_commit'
            triggered_by: [php]
        phpstan:
            configuration: ./phpstan.neon
            use_grumphp_paths: false
            triggered_by: [php]
            memory_limit: "-1"
        # Rector runs in --dry-run mode at commit time so refactors are
        # *flagged* (fails the hook with a diff to apply) but never
        # silently rewritten under the user. To apply, run
        # `composer rector` manually then re-commit.
        rector:
            config: ./rector.php
            triggered_by: [php]
            clear_cache: false
            no_diffs: false
        composer_script:
            script: test
            triggered_by: [php]
        check_env:
            script: check-env
            metadata:
                task: composer_script
        git_blacklist:
            match_word: true
            keywords:
                - " die("
                - " dump("
                - " dd("
                - " var_dump("
                - " exit;"
        git_commit_message:
            enforce_capitalized_subject: false
            max_body_width: 100
            max_subject_width: 100
            type_scope_conventions:
                types:
                    - feat
                    - fix
                    - refactor
                    - chore
                    - style
                    - docs
                    - test
